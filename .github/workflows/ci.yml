name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  # Cross-version test matrix. Each row resolves its own dependency set via
  # `composer update` so we validate against every supported PHP version. The
  # extra `lowest` row pins the dev-dependency floor to catch version drift.
  test:
    name: Tests (PHP ${{ matrix.php }}, ${{ matrix.dependencies }} deps)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4"]
        dependencies: ["highest"]
        include:
          - php: "8.2"
            dependencies: "lowest"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, openssl
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php${{ matrix.php }}-${{ matrix.dependencies }}-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-php${{ matrix.php }}-${{ matrix.dependencies }}-

      - name: Install Composer dependencies
        run: composer update --no-progress --prefer-dist --optimize-autoloader ${{ matrix.dependencies == 'lowest' && '--prefer-lowest' || '' }}

      - name: Run tests
        run: vendor/bin/phpunit --no-coverage

  # Code style, static analysis and the coverage gate, run once on a single PHP version.
  quality:
    name: Lint, Static Analysis & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, openssl
          coverage: xdebug

      - name: Install Composer dependencies
        run: composer update --no-progress --prefer-dist --optimize-autoloader

      - name: Check code style (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --no-progress

      - name: Generate code coverage
        run: XDEBUG_MODE=coverage vendor/bin/phpunit --coverage-clover=coverage/clover.xml

      - name: Check test coverage
        uses: johanvanhelden/gha-clover-test-coverage-check@v1
        with:
          percentage: "90"
          filename: "coverage/clover.xml"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/clover.xml
          retention-days: 1
